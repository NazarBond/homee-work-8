<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <title>Homework</title>

    <link rel="stylesheet" href="./css/styles.css">
</head>

<body>

    <!-- Закладки -->

    <div class="container" id="bookmarkApp">

        <h1>Закладки</h1>

        <input
            type="text"
            id="bookmarkInput"
            placeholder="URL">

        <button id="addBookmarkBtn">
            Додати
        </button>

        <ul id="bookmarkList"></ul>

    </div>


    <!-- Форма -->

    <div class="container" id="formApp">

        <h1>Форма</h1>

        <input
            type="text"
            id="username"
            placeholder="Логін">

        <input
            type="password"
            id="password"
            placeholder="Пароль">

        <button id="saveBtn">
            Зберегти
        </button>

    </div>


    <!-- Пошук -->

    <div class="container">

        <h1>Пошук продуктів</h1>

        <input
            id="search"
            type="text"
            placeholder="Пошук">

        <div id="products"></div>

    </div>

<div></div>

<script type="module" src="./js/index.js"></script>

</body>
</html>
